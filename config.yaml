project:
  name: "MarioKartRL"
  algorithm: "DQN"

environment:
  state_dim: 6
  action_dim: 6
  frame_skip: 4
  max_steps_per_episode: 1000

agent:
  gamma: 0.99
  learning_rate: 0.0001
  epsilon_start: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.995
  batch_size: 32
  target_update_frequency: 1000

training:
  mode: "new"
  num_episodes: 1000
  seed: 42

paths:
  results_dir: "dqn_results"
  model_path: "dqn_results/dqn_model.pth"